<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Resume Analyzer — score and rewrite your résumé with any LLM">
  <defs>
    <pattern id="dots-l" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e5e7e0"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="#fdfdf8"/>
  <rect width="1200" height="400" fill="url(#dots-l)" opacity="0.85"/>
  <rect x="0.5" y="0.5" width="1199" height="399" fill="none" stroke="#bfc1b7"/>

  <g transform="translate(72,72)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#1e1f23"/>
    <path d="M22 24 L22 62 L50 62 L58 54 L58 24 Z" fill="none" stroke="#eeefe9" stroke-width="3.6" stroke-linejoin="round"/>
    <path d="M50 62 L50 54 L58 54" fill="none" stroke="#eeefe9" stroke-width="3.6" stroke-linejoin="round"/>
    <line x1="30" y1="33" x2="52" y2="33" stroke="#9ea096" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="46" y2="40" stroke="#9ea096" stroke-width="3.2" stroke-linecap="round"/>
    <polyline points="30,52 37,45 44,49 51,40" fill="none" stroke="#f7a501" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="51" cy="40" r="3.5" fill="#f54e00"/>
  </g>

  <g transform="translate(72,200)" font-family="IBM Plex Sans, -apple-system, system-ui, Helvetica, sans-serif">
    <text font-size="14" font-weight="700" letter-spacing="2.8" fill="#f54e00">AI-POWERED RÉSUMÉ MATCHING</text>
    <text y="54" font-size="52" font-weight="800" letter-spacing="-1.6" fill="#23251d">resume-analyzer</text>
    <text y="94" font-size="20" font-weight="500" fill="#4d4f46">Score, rewrite, and re-export your résumé — with any LLM you like.</text>

    <g transform="translate(0,120)" font-size="13" font-weight="600">
      <g>
        <rect width="158" height="28" rx="14" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="79" y="19" text-anchor="middle" fill="#23251d">OpenAI-compatible</text>
      </g>
      <g transform="translate(170,0)">
        <rect width="138" height="28" rx="14" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="69" y="19" text-anchor="middle" fill="#23251d">PDF in · PDF out</text>
      </g>
      <g transform="translate(320,0)">
        <rect width="114" height="28" rx="14" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="57" y="19" text-anchor="middle" fill="#23251d">Self-hosted</text>
      </g>
    </g>
  </g>

  <g transform="translate(720,60) rotate(-3)">
    <rect x="0" y="0" width="420" height="280" rx="12" fill="#fdfdf8" stroke="#bfc1b7" stroke-width="1.5"/>

    <g font-family="IBM Plex Sans, -apple-system, system-ui, Helvetica, sans-serif">
      <text x="22" y="34" font-size="11" font-weight="700" letter-spacing="1.6" fill="#65675e">MATCH SCORE</text>
      <text x="22" y="84" font-size="46" font-weight="800" letter-spacing="-1" fill="#23251d">82%</text>
    </g>

    <rect x="22" y="104" width="376" height="9" rx="4.5" fill="#e5e7e0" stroke="#bfc1b7"/>
    <rect x="22" y="104" width="308" height="9" rx="4.5" fill="#1e1f23"/>

    <g transform="translate(22,134)" font-family="IBM Plex Sans, -apple-system, system-ui, Helvetica, sans-serif" font-size="12" font-weight="600">
      <g>
        <rect width="58" height="24" rx="12" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="29" y="16" text-anchor="middle" fill="#23251d">✓ Go</text>
      </g>
      <g transform="translate(66,0)">
        <rect width="72" height="24" rx="12" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="36" y="16" text-anchor="middle" fill="#23251d">✓ htmx</text>
      </g>
      <g transform="translate(146,0)">
        <rect width="96" height="24" rx="12" fill="#e5e7e0" stroke="#bfc1b7"/>
        <text x="48" y="16" text-anchor="middle" fill="#23251d">✓ Postgres</text>
      </g>
      <g transform="translate(250,0)">
        <rect width="116" height="24" rx="12" fill="none" stroke="#b6b7af" stroke-dasharray="3 3"/>
        <text x="58" y="16" text-anchor="middle" fill="#65675e">✗ Kubernetes</text>
      </g>
    </g>

    <g transform="translate(22,176)">
      <rect x="0" y="0" width="376" height="84" rx="6" fill="#eeefe9" stroke="#bfc1b7"/>
      <rect x="0" y="0" width="3" height="84" fill="#1e1f23"/>
      <g font-family="IBM Plex Sans, -apple-system, system-ui, Helvetica, sans-serif">
        <text x="14" y="20" font-size="10" font-weight="700" letter-spacing="1.4" fill="#65675e">SUGGESTED REWRITE</text>
        <text x="14" y="42" font-size="12" fill="#65675e" text-decoration="line-through">Managed team of 4 engineers</text>
        <text x="14" y="64" font-size="12" font-weight="600" fill="#23251d">Led 4-engineer squad; shipped payments</text>
        <text x="14" y="78" font-size="12" font-weight="600" fill="#23251d">service with 99.95% uptime.</text>
      </g>
    </g>
  </g>

  <circle cx="1126" cy="56" r="10" fill="#f54e00"/>
  <circle cx="1096" cy="40" r="4" fill="#f7a501"/>
</svg>
